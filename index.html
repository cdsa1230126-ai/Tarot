<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>タロット占い</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sawarabi+Mincho&display=swap');
        body { background: #1a110a; color: #e0d5c0; font-family: 'Sawarabi Mincho', serif; text-align: center; margin: 0; padding-bottom: 50px; }
        h1 { color: #d4af37; margin-top: 40px; }
        .controls { margin: 20px; }
        button { 
            padding: 12px 20px; cursor: pointer; background: #4a3b2a; color: #d4af37;
            border: 1px solid #d4af37; border-radius: 5px; font-weight: bold; margin: 5px;
        }
        #stage { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; padding: 20px; }
        .card-container { width: 130px; background: #2a1f15; padding: 10px; border: 1px solid #d4af37; border-radius: 8px; }
        .card-emoji { font-size: 3rem; display: block; transition: 0.3s; margin-bottom: 10px; }
        .reversed { transform: rotate(180deg); }
        .label { font-size: 0.8em; color: #d4af37; font-weight: bold; }
        .meaning { font-size: 0.75em; color: #fff; margin-top: 5px; border-top: 1px solid #4a3b2a; padding-top: 5px; }
    </style>
</head>
<body>

    <h1>✨ Tarot Sanctuary ✨</h1>

    <div class="controls">
        <button onclick="spread('one')">ワンオラクル</button>
        <button onclick="spread('three')">スリーカード</button>
        <button onclick="spread('celtic')">ケルティッククロス</button>
    </div>

    <div id="stage"></div>

    <script>
        // script.jsのデータを統合
        const tarotDeck = [
            { name: "0 愚者", upright: "自由・冒険・可能性", reverse: "無計画・無責任" },
            { name: "I 魔術師", upright: "創造・才能・スタート", reverse: "スランプ・技術不足" },
            { name: "II 女教皇", upright: "直感・知性・神秘", reverse: "わがまま・神経質" },
            { name: "III 女帝", upright: "豊かさ・愛情・母性", reverse: "挫折・浪費・感情的" },
            { name: "IV 皇帝", upright: "責任・安定・実行力", reverse: "独断・傲慢・無責任" },
            { name: "V 教皇", upright: "伝統・慈悲・導き", reverse: "束縛・不信感・頑固" },
            { name: "VI 恋人", upright: "選択・調和・ときめき", reverse: "不調和・優柔不断" },
            { name: "VII 戦車", upright: "勝利・前進・強い意志", reverse: "暴走・挫折・好戦的" },
            { name: "VIII 力", upright: "勇気・忍耐・精神力", reverse: "自信過剰・無気力" },
            { name: "IX 隠者", upright: "内省・探求・悟り", reverse: "閉鎖的・孤独・不注意" },
            { name: "X 運命の輪", upright: "チャンス・転換点", reverse: "不運・タイミングの悪さ" },
            { name: "XI 正義", upright: "公平・決断・バランス", reverse: "不公平・偏見・不正" },
            { name: "XII 吊るされた男", upright: "修行・視点の転換", reverse: "無駄な苦労・自己犠牲" },
            { name: "XIII 死神", upright: "終焉・再出発・変化", reverse: "未練・停滞・執着" },
            { name: "XIV 節制", upright: "節度・調和・癒やし", reverse: "不摂生・不調和・消耗" },
            { name: "XV 悪魔", upright: "執着・誘惑・束縛", reverse: "解放・覚醒" },
            { name: "XVI 塔", upright: "崩壊・衝撃・突然の変化", reverse: "緊迫状態・不安" },
            { name: "XVII 星", upright: "希望・願い", reverse: "失望・高望み・悲観的" },
            { name: "XVIII 月", upright: "不安・迷い・潜在意識", reverse: "不安解消・現実逃避" },
            { name: "XIX 太陽", upright: "成功・祝福・明るい未来", reverse: "中断・衰退・元気不足" },
            { name: "XX 審判", upright: "復活・覚醒・結果が出る", reverse: "再起不能・悔恨" },
            { name: "XXI 世界", upright: "完成・完全・ハッピーエンド", reverse: "未完成・限界・スランプ" }
        ];

        const spreads = {
            one: { labels: ["現在"] },
            three: { labels: ["過去", "現在", "未来"] },
            celtic: { labels: ["現状", "影響", "目標", "潜在意識", "過去", "近未来", "立場", "環境", "期待/不安", "最終結果"] }
        };

        function spread(type) {
            const stage = document.getElementById('stage');
            stage.innerHTML = ''; 
            
            let deck = Array.from({length: 22}, (_, i) => i).sort(() => Math.random() - 0.5);
            const config = spreads[type];

            config.labels.forEach((pos, i) => {
                const cardIdx = deck[i];
                const card = tarotDeck[cardIdx];
                const isReversed = Math.random() > 0.5;
                const meaning = isReversed ? card.reverse : card.upright;

                const container = document.createElement('div');
                container.className = 'card-container';
                container.innerHTML = `
                    <div class="label">${pos}</div>
                    <span class="card-emoji ${isReversed ? 'reversed' : ''}">🃏</span>
                    <div class="label">${card.name}<br>(${isReversed ? '逆' : '正'})</div>
                    <div class="meaning">${meaning}</div>
                `;
                stage.appendChild(container);
            });
        }
    </script>
</body>
</html>
