<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIタロット占い - ケルティッククロス・ビジュアル鑑定</title>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sawarabi+Mincho&display=swap');
        body { background: #1a110a; color: #e0d5c0; font-family: 'Sawarabi Mincho', serif; text-align: center; line-height: 1.6; margin: 0; padding-bottom: 50px; }
        h1 { color: #d4af37; text-shadow: 0 0 10px rgba(212, 175, 55, 0.5); margin-top: 40px; }
        .setup-area { max-width: 600px; margin: 20px auto; padding: 20px; background: #2a1f15; border: 1px solid #4a3b2a; border-radius: 8px; }
        input[type="password"] { width: 80%; padding: 12px; background: #1a110a; border: 1px solid #d4af37; color: #fff; border-radius: 4px; font-size: 16px; }
        .controls { margin: 20px; }
        button { padding: 12px 24px; cursor: pointer; background: #4a3b2a; color: #d4af37; border: 1px solid #d4af37; border-radius: 5px; font-weight: bold; margin: 8px; transition: 0.3s; font-family: 'Sawarabi Mincho', serif; }
        button:hover { background: #d4af37; color: #1a110a; }

        /* カード配置エリア（ここをキャプチャします） */
        #stage { 
            display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; 
            padding: 25px; min-height: 250px; 
            border: 2px dashed #4a3b2a; 
            margin: 20px auto;
            max-width: 1000px;
            background: #1a110a;
        }
        .card-container { width: 120px; text-align: center; }
        .card-img { width: 100%; border: 1px solid #d4af37; border-radius: 6px; box-shadow: 0 5px 15px rgba(0,0,0,0.7); }
        .reversed { transform: rotate(180deg); }
        .label { margin-top: 8px; font-size: 0.75em; color: #d4af37; font-weight: bold; }

        #reading-area { max-width: 800px; margin: 30px auto; padding: 30px; background: #2a1f15; border: 2px double #d4af37; border-radius: 10px; text-align: left; display: none; white-space: pre-wrap; color: #f0e6d2; }
        .loading-dots:after { content: ' .'; animation: dots 1.5s steps(5, end) infinite;}
        @keyframes dots { 0%, 20% { color: rgba(0,0,0,0); text-shadow: .25em 0 0 rgba(0,0,0,0), .5em 0 0 rgba(0,0,0,0); } 40% { color: #d4af37; text-shadow: .25em 0 0 rgba(0,0,0,0), .5em 0 0 rgba(0,0,0,0); } 60% { text-shadow: .25em 0 0 #d4af37, .5em 0 0 rgba(0,0,0,0); } 80%, 100% { text-shadow: .25em 0 0 #d4af37, .5em 0 0 #d4af37; } }
        .error-msg { color: #ff6b6b; font-size: 0.9em; margin-top: 10px; border: 1px solid #ff6b6b; padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>

    <h1>✨ Tarot Sanctuary ✨</h1>

    <div class="setup-area">
        <p>Gemini API Keyを入力してください</p>
        <input type="password" id="api-key" placeholder="ここにAPIキーを貼り付け">
    </div>

    <div class="controls">
        <button onclick="spread('celtic')">ケルティッククロス展開</button>
        <br><br>
        <button id="ai-btn" style="display:none; background: #d4af37; color: #1a110a;" onclick="getGeminiVisualReading()">🔮 運命を解読する（ビジュアル鑑定）</button>
    </div>

    <div id="stage"></div>
    <div id="reading-area"></div>

    <script>
        let currentResult = [];
        const cardNames = ["0 愚者", "I 魔術師", "II 女教皇", "III 女帝", "IV 皇帝", "V 教皇", "VI 恋人", "VII 戦車", "VIII 力", "IX 隠者", "X 運命の輪", "XI 正義", "XII 吊るされた男", "XIII 死神", "XIV 節制", "XV 悪魔", "XVI 塔", "XVII 星", "XVIII 月", "XIX 太陽", "XX 審判", "XXI 世界"];

        function spread(type) {
            const stage = document.getElementById('stage');
            const readingArea = document.getElementById('reading-area');
            stage.innerHTML = ''; 
            readingArea.style.display = 'none';
            currentResult = [];

            let deck = Array.from({length: 22}, (_, i) => i).sort(() => Math.random() - 0.5);
            const labels = ["現状", "影響", "目標", "潜在", "過去", "近未来", "立場", "環境", "期待不安", "結果"];

            labels.forEach((pos, i) => {
                const cardIdx = deck[i];
                const isReversed = Math.random() > 0.5;
                currentResult.push({ pos: pos, name: cardNames[cardIdx], status: isReversed ? "逆位置" : "正位置" });

                const container = document.createElement('div');
                container.className = 'card-container';
                container.innerHTML = `
                    <img src="card_${cardIdx}.png" class="card-img ${isReversed ? 'reversed' : ''}">
                    <div class="label">${pos}<br>${cardNames[cardIdx]} (${isReversed ? '逆' : '正'})</div>
                `;
                stage.appendChild(container);
            });
            document.getElementById('ai-btn').style.display = 'inline-block';
        }

        async function getGeminiVisualReading() {
            const apiKey = document.getElementById('api-key').value;
            const stage = document.getElementById('stage');
            const readingArea = document.getElementById('reading-area');
            
            if (!apiKey) return alert("APIキーを入力してください。");
            
            readingArea.style.display = 'block';
            readingArea.innerHTML = '<p class="loading-dots">星の導きと画像を照合しています（軽量化処理中）</p>';

            try {
                // 【軽量化】scaleを0.5にして、送信データ量を減らし 429エラーを回避しやすくします
                const canvas = await html2canvas(stage, {
                    backgroundColor: "#1a110a",
                    scale: 0.5 
                });
                
                const dataUrl = canvas.toDataURL('image/jpeg', 0.7); // JPEG圧縮でさらに軽量化
                const base64Data = dataUrl.split(',')[1];

                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent?key=${apiKey}`;

                const requestBody = {
                    contents: [{
                        parts: [
                            { text: "あなたは神秘的なタロット占い師です。画像に展開された10枚のカード（ケルティッククロス）を見て、その配置と絵柄からインスピレーションを受け、相談者の運命を深く鑑定してください。日本語で、優しく、かつ鋭く読み解いてください。" },
                            { inline_data: { mime_type: "image/jpeg", data: base64Data } }
                        ]
                    }]
                };

                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(requestBody)
                });

                const data = await response.json();
                
                if (!response.ok) {
                    if (response.status === 429) {
                        throw new Error("【利用制限中】Google側の無料枠上限に達しました。15分ほど時間を空けてから再度お試しください。");
                    }
                    throw new Error(data.error ? data.error.message : "通信エラーが発生しました。");
                }
                
                const text = data.candidates[0].content.parts[0].text;
                readingArea.innerHTML = `<h2>🔮 運命の鑑定結果</h2>${text}`;

            } catch (err) {
                console.error("Visual API Error:", err.message);
                
                let fallback = `<h3>🌙 簡易鑑定（バックアップ）</h3><div class="error-msg">${err.message}</div><hr>`;
                currentResult.forEach(c => {
                    fallback += `<p><strong>${c.pos}</strong>: ${c.name} (${c.status})</p>`;
                });
                readingArea.innerHTML = fallback;
            }
        }
    </script>
</body>
</html>
